<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC-MAN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #FFD700;
    overflow: hidden;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 560px;
    padding: 8px 0;
    font-size: 11px;
    letter-spacing: 1px;
  }
  #canvas { display: block; border: 2px solid #1a1aff; box-shadow: 0 0 30px #1a1aff88; }
  #message { margin-top: 12px; font-size: 10px; color: #aaa; letter-spacing: 1px; height: 16px; text-align: center; }
</style>
</head>
<body>
<div id="hud">
  <span>SCORE: <span id="score-display">0</span></span>
  <span>PAC-MAN</span>
  <span>LIVES: <span id="lives-display">3</span></span>
</div>
<canvas id="canvas" width="560" height="620"></canvas>
<div id="message">PRESS ENTER OR SPACE TO START</div>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score-display');
const livesEl = document.getElementById('lives-display');
const msgEl   = document.getElementById('message');

const T    = 20;   // tile size px
const COLS = 28;
const ROWS = 31;

// 1=wall  2=dot  3=power  0=open
const RAW = [
  "1111111111111111111111111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1311112111112112111112111131",
  "1211112111112112111112111121",
  "1222222222222222222222222221",
  "1211112211111111111122111121",
  "1211112211111111111122111121",
  "1222222211222112222122222221",
  "1111112111000110001111111111",
  "1111112111000110001111111111",
  "1111112000000000000211111111",
  "1111112100011110001211111111",
  "1111112100000000001211111111",
  "0000002100000000001200000000",
  "1111112100000000001211111111",
  "1111112100111111001211111111",
  "1111112000000000000211111111",
  "1111112111000110001111111111",
  "1111112111000110001111111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1211112111112112111112111131",
  "1222211222222002222221122221",
  "1112211211111111111122112111",
  "1112211211111111111122112111",
  "1222221122222112222211222221",
  "1211111111112112111111111121",
  "1211111111112112111111111121",
  "1222222222222222222222222221",
  "1111111111111111111111111111",
];

function buildMap() { return RAW.map(r => r.split('').map(Number)); }

// tile col → pixel centre x
function tcx(col) { return ((col % COLS + COLS) % COLS) * T + T / 2; }
// tile row → pixel centre y
function tcy(row) { return row * T + T / 2; }

function isWall(map, col, row) {
  if (row < 0 || row >= ROWS) return false;
  return map[row][((col % COLS) + COLS) % COLS] === 1;
}
function getTile(map, col, row) {
  if (row < 0 || row >= ROWS) return 0;
  return map[row][((col % COLS) + COLS) % COLS];
}
function setTile(map, col, row, v) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
  map[row][col] = v;
}

// ─── State ───────────────────────────────────────────────────────────────────

let map, score, lives, gameState, frightenTimer;
let pacman, ghosts;
const FRIGHTEN_DURATION = 300;
const GHOST_COLORS = ['#FF0000','#FFB8FF','#00FFFF','#FFB852'];

function initGame() {
  map   = buildMap();
  score = 0; lives = 3; frightenTimer = 0;
  scoreEl.textContent = 0;
  livesEl.textContent = 3;
  spawnEntities();
}

/*
  Each entity moves tile-by-tile.
  x, y  = current pixel position (updated every frame)
  tileX/tileY = the tile we are currently heading TOWARD
  dx/dy = current movement direction  (-1/0/+1)
  progress = 0..1 how far we are between previous tile centre and tileX/tileY
*/
function makePacman() {
  const startCol = 14, startRow = 23;
  return {
    x: tcx(startCol), y: tcy(startRow),
    tileX: startCol,  tileY: startRow,
    dx: -1, dy: 0,
    nextDx: -1, nextDy: 0,
    progress: 0,
    speed: 0.14,   // fraction of a tile per frame
    mouth: 0.25, mouthDir: 1,
    dying: false, deathFrame: 0, deathDone: false,
  };
}

function makeGhost(col, row, dx, dy, color, releaseDelay) {
  return {
    x: tcx(col), y: tcy(row),
    tileX: col,  tileY: row,
    dx, dy,
    progress: 0,
    speed: 0.1,
    color,
    frightened: false,
    eaten: false,
    released: releaseDelay === 0,
    releaseTimer: releaseDelay,
  };
}

function spawnEntities() {
  pacman = makePacman();
  ghosts = [
    makeGhost(14, 11, -1,  0, GHOST_COLORS[0],   0),  // Blinky – out immediately
    makeGhost(13, 13,  1,  0, GHOST_COLORS[1], 120),
    makeGhost(14, 13, -1,  0, GHOST_COLORS[2], 240),
    makeGhost(15, 13,  1,  0, GHOST_COLORS[3], 360),
  ];
}

// ─── Movement ────────────────────────────────────────────────────────────────

function advancePacman() {
  const p = pacman;
  if (p.dying) { p.deathFrame += 0.03; return; }

  p.progress += p.speed;

  // Arrived at tile centre
  if (p.progress >= 1) {
    p.progress = 0;

    // Snap x/y exactly to tile centre to prevent drift
    p.x = tcx(p.tileX);
    p.y = tcy(p.tileY);

    // Eat
    const tv = getTile(map, p.tileX, p.tileY);
    if (tv === 2) {
      setTile(map, p.tileX, p.tileY, 0);
      score += 10; scoreEl.textContent = score;
    } else if (tv === 3) {
      setTile(map, p.tileX, p.tileY, 0);
      score += 50; scoreEl.textContent = score;
      frightenTimer = FRIGHTEN_DURATION;
      ghosts.forEach(g => { if (g.released) { g.frightened = true; g.eaten = false; } });
    }

    // Choose next tile
    const col = p.tileX, row = p.tileY;
    let ndx = p.dx, ndy = p.dy;

    // Try queued direction
    if (!isWall(map, col + p.nextDx, row + p.nextDy)) {
      ndx = p.nextDx; ndy = p.nextDy;
    }
    // If still blocked, stop
    if (isWall(map, col + ndx, row + ndy)) { ndx = 0; ndy = 0; }

    p.dx = ndx; p.dy = ndy;
    p.tileX = ((col + ndx) % COLS + COLS) % COLS;
    p.tileY = row + ndy;
  }

  // Interpolate pixel position between last tile centre and next tile centre
  const prevX = tcx(((p.tileX - p.dx) % COLS + COLS) % COLS);
  const prevY = tcy(p.tileY - p.dy);
  p.x = prevX + (tcx(p.tileX) - prevX) * p.progress;
  p.y = prevY + (tcy(p.tileY) - prevY) * p.progress;

  // Mouth
  p.mouth += 0.07 * p.mouthDir;
  if (p.mouth >= 0.28) p.mouthDir = -1;
  if (p.mouth <= 0.02) p.mouthDir =  1;
}

function advanceGhost(g) {
  if (!g.released) {
    if (--g.releaseTimer <= 0) {
      g.released = true;
      g.tileX = 14; g.tileY = 11;
      g.x = tcx(14); g.y = tcy(11);
      g.dx = -1; g.dy = 0; g.progress = 0;
    }
    return;
  }

  const spd = g.eaten ? 0.2 : g.frightened ? 0.07 : g.speed;
  g.progress += spd;

  if (g.progress >= 1) {
    g.progress = 0;
    g.x = tcx(g.tileX);
    g.y = tcy(g.tileY);

    const col = g.tileX, row = g.tileY;
    const DIRS = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];

    // Don't reverse unless forced
    let options = DIRS.filter(d =>
      !(d.dx === -g.dx && d.dy === -g.dy) && !isWall(map, col+d.dx, row+d.dy)
    );
    if (!options.length) options = [{dx:-g.dx, dy:-g.dy}];

    let chosen;
    if (g.frightened) {
      chosen = options[Math.floor(Math.random() * options.length)];
    } else {
      // Chase: minimise Manhattan distance to pacman's tile
      chosen = options.reduce((best, d) => {
        const da = Math.abs(pacman.tileX-(col+d.dx))    + Math.abs(pacman.tileY-(row+d.dy));
        const db = Math.abs(pacman.tileX-(col+best.dx)) + Math.abs(pacman.tileY-(row+best.dy));
        return da < db ? d : best;
      });
    }

    g.dx = chosen.dx; g.dy = chosen.dy;
    g.tileX = ((col + g.dx) % COLS + COLS) % COLS;
    g.tileY = row + g.dy;
  }

  const prevX = tcx(((g.tileX - g.dx) % COLS + COLS) % COLS);
  const prevY = tcy(g.tileY - g.dy);
  g.x = prevX + (tcx(g.tileX) - prevX) * g.progress;
  g.y = prevY + (tcy(g.tileY) - prevY) * g.progress;
}

function checkCollisions() {
  if (pacman.dying) return;
  ghosts.forEach(g => {
    if (!g.released) return;
    if (Math.hypot(pacman.x - g.x, pacman.y - g.y) < T * 0.85) {
      if (g.frightened && !g.eaten) {
        g.eaten = true; g.frightened = false;
        score += 200; scoreEl.textContent = score;
        g.tileX = 14; g.tileY = 13;
        g.x = tcx(14); g.y = tcy(13);
        g.dx = 1; g.dy = 0; g.progress = 0;
        g.released = false; g.releaseTimer = 120;
      } else if (!g.frightened && !g.eaten) {
        pacman.dying = true; pacman.deathFrame = 0; pacman.deathDone = false;
      }
    }
  });
}

function countDots() {
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (map[r][c] === 2 || map[r][c] === 3) n++;
  return n;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────

function drawMaze() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v  = map[r][c];
      const px = c * T, py = r * T;
      if (v === 1) {
        ctx.fillStyle = '#00008B';
        ctx.fillRect(px, py, T, T);
        ctx.strokeStyle = '#3333ff'; ctx.lineWidth = 1;
        ctx.strokeRect(px+.5, py+.5, T-1, T-1);
      } else if (v === 2) {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(px+T/2, py+T/2, 2, 0, Math.PI*2); ctx.fill();
      } else if (v === 3) {
        ctx.fillStyle = '#FFD700';
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(px+T/2, py+T/2, 5.5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }
}

function drawPacman() {
  const p = pacman;
  const rad = T / 2 - 1;
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;

  if (p.dying) {
    const open = Math.min(p.deathFrame, 1);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.arc(p.x, p.y, rad, open * Math.PI, (2 - open) * Math.PI);
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    if (p.deathFrame >= 1 && !p.deathDone) {
      p.deathDone = true;
      setTimeout(() => {
        if (--lives <= 0) {
          livesEl.textContent = 0;
          gameState = 'gameover';
          msgEl.textContent = 'GAME OVER — PRESS ENTER TO RESTART';
        } else {
          livesEl.textContent = lives;
          spawnEntities();
          gameState = 'ready';
          msgEl.textContent = 'PRESS ENTER TO CONTINUE';
        }
      }, 400);
    }
    return;
  }

  const angle = Math.atan2(p.dy, p.dx) || 0;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.arc(p.x, p.y, rad, angle + p.mouth * Math.PI, angle + (2 - p.mouth) * Math.PI);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;

  // eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(p.x + Math.cos(angle-0.6)*(rad-3), p.y + Math.sin(angle-0.6)*(rad-3), 2, 0, Math.PI*2);
  ctx.fill();
}

function drawGhost(g) {
  if (!g.released) return;
  const rad = T / 2 - 1;
  let col = g.color;
  if (g.frightened) col = (frightenTimer < 80 && Math.floor(frightenTimer/8)%2) ? '#fff' : '#0000cc';
  ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(g.x, g.y-2, rad, Math.PI, 0);
  const segW = (rad*2)/4, baseY = g.y+rad-2;
  ctx.lineTo(g.x+rad, baseY);
  for (let i=4;i>=0;i--) ctx.lineTo(g.x-rad+i*segW, baseY-(i%2===0?0:rad*0.4));
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
  if (!g.frightened) {
    [-rad*.35,rad*.35].forEach(ox=>{
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(g.x+ox,g.y-2,rad*.28,rad*.35,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#00f'; ctx.beginPath(); ctx.arc(g.x+ox+g.dx*2,g.y-2+g.dy*2,rad*.15,0,Math.PI*2); ctx.fill();
    });
  }
}

// ─── Loop ─────────────────────────────────────────────────────────────────────

function update() {
  if (gameState !== 'playing') return;
  advancePacman();
  ghosts.forEach(advanceGhost);
  if (frightenTimer > 0 && --frightenTimer === 0)
    ghosts.forEach(g => { g.frightened = false; });
  checkCollisions();
  if (countDots() === 0) {
    gameState = 'win';
    msgEl.textContent = '🎉 YOU WIN! PRESS ENTER FOR NEW GAME';
  }
}

function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawMaze(); ghosts.forEach(drawGhost); drawPacman();
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ─── Input ────────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key==='Enter'||e.key===' ') {
    if (gameState!=='playing') {
      if (gameState==='gameover'||gameState==='win') initGame();
      gameState='playing'; msgEl.textContent='';
    }
  }
  if (gameState==='playing') {
    if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A'){pacman.nextDx=-1;pacman.nextDy= 0;}
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D'){pacman.nextDx= 1;pacman.nextDy= 0;}
    if (e.key==='ArrowUp'   ||e.key==='w'||e.key==='W'){pacman.nextDx= 0;pacman.nextDy=-1;}
    if (e.key==='ArrowDown' ||e.key==='s'||e.key==='S'){pacman.nextDx= 0;pacman.nextDy= 1;}
  }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});

let tx0, ty0;
canvas.addEventListener('touchstart',e=>{
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY;
  if(gameState!=='playing'){if(gameState==='gameover'||gameState==='win')initGame();gameState='playing';msgEl.textContent='';}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)){pacman.nextDx=dx>0?1:-1;pacman.nextDy=0;}
  else{pacman.nextDy=dy>0?1:-1;pacman.nextDx=0;}
  e.preventDefault();
},{passive:false});

// ─── Boot ─────────────────────────────────────────────────────────────────────
initGame();
gameState = 'ready';
requestAnimationFrame(loop);
</script>
</body>
</html>
